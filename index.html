<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CAG마케팅유닛 워크로그</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>
<style>
*{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;box-sizing:border-box;}
body{margin:0;padding:0;background:#f1f5f9;}
button,input,select{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;}
input:focus,select:focus{outline:none;}
ul{margin:0;padding-left:14px;}li{margin-bottom:2px;}
.ib{padding:3px 6px;border:none;background:none;cursor:pointer;font-size:13px;color:#cbd5e1;transition:color .15s;}
.ib:hover{color:#475569;}
</style>
</head>
<body><div id="app"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot,query,orderBy,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyCBUprzRAVme2c4DlDH2JRV6blPmQ7awnM",authDomain:"cag-mkt-worklog.firebaseapp.com",projectId:"cag-mkt-worklog",storageBucket:"cag-mkt-worklog.firebasestorage.app",messagingSenderId:"318995097468",appId:"1:318995097468:web:0934b2591bfe66be9fa6f9"};
const db=getFirestore(initializeApp(FB));

const C1=['VD글로벌','VD중국','마영전','기타'];
const CI={'VD글로벌':'🌍','VD중국':'🇨🇳','마영전':'📊','기타':'📌'};
const CC={'VD글로벌':'#3b82f6','VD중국':'#ef4444','마영전':'#10b981','기타':'#8b5cf6'};
const UC={user1:'#3b82f6',user2:'#ef4444',user3:'#10b981',user4:'#a855f7',user5:'#f97316',user6:'#ec4899',user7:'#06b6d4',user8:'#f59e0b'};
const MB=[{id:'user1',name:'한지혜'},{id:'user2',name:'김지선'},{id:'user3',name:'이소연'},{id:'user4',name:'박수민'},{id:'user5',name:'유은지'},{id:'user6',name:'김민정'},{id:'user7',name:'권세봉'},{id:'user8',name:'전룡'}];
const FK=['예정','필요','계획','검토','추진','준비','논의','협의','요청','대기','보류','예상'];

function ef(){return{tasks:[''],cat2:'',deadline:'',memo:''}}
const S={
  user:null,color:null,view:'my',
  selDate:td(),
  calMonth:new Date(),myCalMonth:new Date(),
  calWeekOff:0,
  logs:[],cat2:[],notices:[],
  form:{VD글로벌:ef(),VD중국:ef(),마영전:ef(),기타:ef()},
  editId:null,delId:null,
  newCat2:'',editCat2:null,editCat2Val:'',
  newNotice:'',repWeek:0,
};

onSnapshot(query(collection(db,'worklogs'),orderBy('createdAt','desc')),s=>{
  S.logs=s.docs.map(d=>({id:d.id,...d.data()}));
  draw();
});
onSnapshot(doc(db,'settings','cat2'),s=>{S.cat2=s.exists()?(s.data().list||[]):[];draw();});
onSnapshot(doc(db,'settings','notices'),s=>{S.notices=s.exists()?(s.data().list||[]):[];draw();});

function td(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function nows(){const d=new Date();return td()+' '+pad(d.getHours())+':'+pad(d.getMinutes());}
function pad(n){return String(n).padStart(2,'0');}
function uname(id){return MB.find(m=>m.id===(id||S.user))?.name||'';}
function wMon(off){
  const t=new Date(),m=new Date(t);
  m.setDate(t.getDate()-((t.getDay()+6)%7)+(off*7));
  m.setHours(0,0,0,0);return m;
}
function wEnd(m){const e=new Date(m);e.setDate(m.getDate()+6);e.setHours(23,59,59,999);return e;}
function dLeft(dl){return Math.ceil((new Date(dl)-new Date())/86400000);}
function hasFKW(log){return FK.some(k=>[...(log.tasks||[]),log.note||''].join(' ').includes(k));}

// 날짜 문자열 비교로 주간 필터 (Date 객체 변환 오류 방지)
function inWeek(dateStr, mon, sun){
  return dateStr >= mon.toISOString().split('T')[0] && dateStr <= sun.toISOString().split('T')[0];
}

function badge(c1,c2){
  const ic=CI[c1]||'📌',cc=CC[c1]||'#64748b';
  return '<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;background:'+cc+'18;color:'+cc+';font-size:11px;font-weight:700;border:1px solid '+cc+'33;">'+ic+' '+c1+(c2?' › '+c2:'')+'</span>';
}

function ctrl(log,canEdit){
  return '<div style="display:flex;gap:1px;flex-shrink:0;">'+
  (canEdit&&log.completed!==undefined?'<button class="ib" onclick="W.done(\''+log.id+'\')" style="color:'+(log.completed?'#16a34a':'#cbd5e1')+';">✓</button>':'')+
  (canEdit?'<button class="ib" onclick="W.edit(\''+log.id+'\')">✎</button>':'')+
  '<button class="ib" onclick="W.copy(\''+log.id+'\')">⎘</button>'+
  (canEdit?'<button class="ib" onclick="W.del(\''+log.id+'\')" style="color:#fca5a5;">✕</button>':'')+
  '</div>';
}

async function saveLog(cat1){
  const f=S.form[cat1],tasks=f.tasks.filter(t=>t.trim());
  if(!tasks.length){alert(cat1+' 업무 내용을 입력하세요.');return;}
  const data={
    userId:S.user,userName:uname(),
    date:td(),time:nows(),
    cat1,cat2:f.cat2||'',tasks,
    completed:false,deadline:f.deadline||'',
    note:f.memo||'',createdAt:new Date().toISOString()
  };
  if(S.editId){await updateDoc(doc(db,'worklogs',S.editId),data);S.editId=null;}
  else await addDoc(collection(db,'worklogs'),data);
  S.form[cat1]=ef();draw();
}
async function doDel(){if(S.delId){await deleteDoc(doc(db,'worklogs',S.delId));S.delId=null;draw();}}
async function toggleDone(id){const l=S.logs.find(w=>w.id===id);if(l)await updateDoc(doc(db,'worklogs',id),{completed:!l.completed});}
function startEdit(id){
  const l=S.logs.find(w=>w.id===id);if(!l)return;
  S.editId=id;
  S.form[l.cat1]={tasks:[...l.tasks],cat2:l.cat2||'',deadline:l.deadline||'',memo:l.note||''};
  S.view='my';draw();
}
function copyLog(id){
  const l=S.logs.find(w=>w.id===id);if(!l)return;
  navigator.clipboard.writeText('['+l.userName+'] '+l.date+'\n['+l.cat1+(l.cat2?' › '+l.cat2:'')+' ]\n'+l.tasks.join('\n')+(l.deadline?'\n기한: '+l.deadline:'')+(l.note?'\n메모: '+l.note:''));
  alert('복사됐습니다!');
}
async function addCat2(){const v=S.newCat2.trim();if(!v)return;await setDoc(doc(db,'settings','cat2'),{list:[...S.cat2,{id:Date.now()+'',name:v}]});S.newCat2='';draw();}
async function delCat2(id){await setDoc(doc(db,'settings','cat2'),{list:S.cat2.filter(c=>c.id!==id)});}
async function saveCat2Edit(){await setDoc(doc(db,'settings','cat2'),{list:S.cat2.map(c=>c.id===S.editCat2?{...c,name:S.editCat2Val}:c)});S.editCat2=null;S.editCat2Val='';draw();}
async function addNotice(){const v=S.newNotice.trim();if(!v)return;await setDoc(doc(db,'settings','notices'),{list:[...S.notices,{id:Date.now()+'',text:v,author:uname(),date:td()}]});S.newNotice='';draw();}
async function delNotice(id){await setDoc(doc(db,'settings','notices'),{list:S.notices.filter(n=>n.id!==id)});}

function draw(){document.getElementById('app').innerHTML=S.user?appHTML():loginHTML();}

function loginHTML(){
  return '<div style="min-height:100vh;background:linear-gradient(135deg,#eff6ff,#e0e7ff);display:flex;align-items:center;justify-content:center;padding:16px;">'+
  '<div style="background:#fff;border-radius:20px;box-shadow:0 25px 60px rgba(0,0,0,.12);padding:36px;max-width:400px;width:100%;">'+
  '<div style="text-align:center;margin-bottom:28px;"><div style="font-size:44px;margin-bottom:10px;">📋</div>'+
  '<h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0 0 6px;">CAG마케팅유닛 워크로그</h1>'+
  '<p style="color:#94a3b8;font-size:14px;margin:0;">팀원을 선택해 로그인하세요</p></div>'+
  '<div style="display:flex;flex-direction:column;gap:8px;">'+
  MB.map(m=>'<button onclick="W.login(\''+m.id+'\')" style="padding:13px 16px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;text-align:left;cursor:pointer;font-size:14px;font-weight:600;color:#1e293b;display:flex;align-items:center;gap:10px;" onmouseover="this.style.borderColor=\''+UC[m.id]+'\'" onmouseout="this.style.borderColor=\'#e2e8f0\'">'+
  '<span style="width:12px;height:12px;border-radius:50%;background:'+UC[m.id]+';display:inline-block;flex-shrink:0;"></span>'+m.name+'</button>').join('')+
  '</div></div></div>';
}

function appHTML(){
  const tabs=[{id:'my',l:'📝 나의 업무'},{id:'calendar',l:'📅 캘린더'},{id:'report',l:'📊 주간보고서'},{id:'future',l:'🎯 향후 일정'},{id:'settings',l:'⚙️ 설정'}];
  let body='';
  if(S.view==='my')body=myHTML();
  else if(S.view==='calendar')body=calHTML();
  else if(S.view==='report')body=repHTML();
  else if(S.view==='future')body=futHTML();
  else if(S.view==='settings')body=setHTML();
  return (S.delId?delModal():'')+
  '<div style="min-height:100vh;background:#f1f5f9;">'+
  '<div style="background:'+S.color+';position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);">'+
  '<div style="max-width:1400px;margin:0 auto;padding:13px 28px;display:flex;justify-content:space-between;align-items:center;">'+
  '<h1 style="color:#fff;font-size:17px;font-weight:800;margin:0;">CAG마케팅유닛 워크로그</h1>'+
  '<div style="display:flex;align-items:center;gap:12px;"><span style="color:#fff;font-weight:700;font-size:14px;">'+uname()+'</span>'+
  '<button onclick="W.logout()" style="color:rgba(255,255,255,.75);font-size:12px;background:rgba(255,255,255,.15);border:none;cursor:pointer;padding:4px 10px;border-radius:6px;">로그아웃</button></div></div></div>'+
  '<div style="max-width:1400px;margin:0 auto;padding:0 28px 40px;">'+
  '<div style="display:flex;gap:2px;border-bottom:2px solid #e2e8f0;margin-bottom:22px;background:#fff;overflow-x:auto;">'+
  tabs.map(t=>'<button onclick="W.view(\''+t.id+'\')" style="padding:12px 18px;font-size:13px;font-weight:600;white-space:nowrap;background:none;border:none;cursor:pointer;border-bottom:3px solid '+(S.view===t.id?S.color:'transparent')+';color:'+(S.view===t.id?S.color:'#64748b')+';margin-bottom:-2px;">'+t.l+'</button>').join('')+
  '</div>'+body+'</div></div>';
}

function delModal(){
  return '<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;">'+
  '<div style="background:#fff;border-radius:14px;padding:26px;max-width:310px;width:90%;box-shadow:0 25px 60px rgba(0,0,0,.25);">'+
  '<h3 style="font-size:17px;font-weight:800;color:#0f172a;margin:0 0 8px;">🗑 삭제 확인</h3>'+
  '<p style="color:#64748b;font-size:13px;margin:0 0 20px;line-height:1.6;">정말로 삭제하시겠습니까?<br>삭제된 업무는 복구할 수 없습니다.</p>'+
  '<div style="display:flex;gap:8px;">'+
  '<button onclick="W.doDel()" style="flex:1;padding:10px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;">삭제</button>'+
  '<button onclick="W.cancelDel()" style="flex:1;padding:10px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;">취소</button>'+
  '</div></div></div>';
}

function logCard(log,canEdit){
  const dl=log.deadline?dLeft(log.deadline):null,urg=dl!==null&&dl<=3&&dl>=0;
  return '<div style="border:1px solid '+(urg?'#fca5a5':'#e2e8f0')+';border-radius:8px;padding:10px 12px;margin-bottom:7px;background:'+(urg?'#fff1f2':'#fff')+';">'+
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:4px;flex-wrap:wrap;">'+
  '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">'+
  badge(log.cat1||'기타',log.cat2||'')+
  '<span style="font-size:10px;color:#94a3b8;">'+log.time+'</span>'+
  (log.deadline?'<span style="font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;background:'+(urg?'#fee2e2':'#dbeafe')+';color:'+(urg?'#b91c1c':'#1d4ed8')+';">📅'+log.deadline+' '+(dl===0?'(오늘)':dl<0?'(지남)':'('+dl+'일)')+'</span>':'')+
  '</div>'+ctrl(log,canEdit)+'</div>'+
  '<ul>'+log.tasks.map(t=>'<li style="font-size:12px;color:'+(log.completed?'#94a3b8':'#334155')+';'+(log.completed?'text-decoration:line-through;':'')+'">'+t+'</li>').join('')+'</ul>'+
  (log.note?'<p style="font-size:10px;color:#94a3b8;margin:3px 0 0;font-style:italic;">📌 '+log.note+'</p>':'')+
  '</div>';
}

function teamCard(log){
  const isMine=log.userId===S.user,dl=log.deadline?dLeft(log.deadline):null,urg=dl!==null&&dl<=3&&dl>=0;
  return '<div style="border:1px solid '+(urg?'#fca5a5':'#e2e8f0')+';border-radius:8px;padding:10px 12px;margin-bottom:7px;background:'+(urg?'#fff1f2':'#fff')+';">'+
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:4px;flex-wrap:wrap;">'+
  '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">'+
  '<span style="width:7px;height:7px;border-radius:50%;background:'+UC[log.userId]+';display:inline-block;flex-shrink:0;"></span>'+
  '<span style="font-size:12px;font-weight:700;color:#1e293b;">'+log.userName+'</span>'+
  badge(log.cat1||'기타',log.cat2||'')+
  '<span style="font-size:10px;color:#94a3b8;">'+log.time+'</span>'+
  (log.deadline?'<span style="font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;background:'+(urg?'#fee2e2':'#dbeafe')+';color:'+(urg?'#b91c1c':'#1d4ed8')+';">📅'+log.deadline+'</span>':'')+
  '</div>'+ctrl(log,isMine)+'</div>'+
  '<ul>'+log.tasks.map(t=>'<li style="font-size:12px;color:'+(log.completed?'#94a3b8':'#334155')+';'+(log.completed?'text-decoration:line-through;':'')+'">'+t+'</li>').join('')+'</ul>'+
  (log.note?'<p style="font-size:10px;color:#94a3b8;margin:3px 0 0;font-style:italic;">📌 '+log.note+'</p>':'')+
  '</div>';
}

function miniCal(mDate,dlLogs){
  const yr=mDate.getFullYear(),mo=mDate.getMonth();
  const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const tdv=td();
  let cells='';
  for(let i=0;i<fd;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=yr+'-'+pad(mo+1)+'-'+pad(d);
    const dl=dlLogs.filter(w=>w.deadline===ds);
    const sel=ds===S.selDate,isT=ds===tdv;
    cells+='<div onclick="W.selDate(\''+ds+'\')" style="text-align:center;padding:5px 2px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:'+(isT||sel?'700':'400')+';background:'+(sel?'transparent':isT?S.color+'18':'transparent')+';color:'+(sel?S.color:isT?S.color:'#334155')+';border:2px solid '+(sel?S.color:isT?S.color+'44':'transparent')+';">'+d+
    (dl.length?'<div style="display:flex;justify-content:center;gap:1px;margin-top:1px;">'+dl.slice(0,3).map(l=>'<span style="width:5px;height:5px;border-radius:50%;background:'+(UC[l.userId]||S.color)+';display:inline-block;"></span>').join('')+'</div>':'<div style="height:6px;"></div>')+
    '</div>';
  }
  const mDL=dlLogs.filter(w=>w.deadline&&w.deadline.startsWith(yr+'-'+pad(mo+1))).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  return '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:18px 16px;margin-bottom:18px;">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'+
  '<button onclick="W.prevMyCal()" style="width:28px;height:28px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:16px;color:#64748b;">‹</button>'+
  '<span style="font-weight:800;font-size:15px;color:#0f172a;">'+yr+'년 '+MN[mo]+'</span>'+
  '<button onclick="W.nextMyCal()" style="width:28px;height:28px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:16px;color:#64748b;">›</button>'+
  '</div>'+
  '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;">'+
  ['일','월','화','수','목','금','토'].map((d,i)=>'<div style="text-align:center;font-size:11px;font-weight:700;color:'+(i===0?'#ef4444':i===6?'#3b82f6':'#94a3b8')+';padding:3px 0;">'+d+'</div>').join('')+
  '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">'+cells+'</div>'+
  (mDL.length?'<div style="margin-top:14px;padding-top:12px;border-top:1px solid #f1f5f9;"><p style="font-size:11px;font-weight:700;color:#64748b;margin:0 0 7px;">이번달 기한 업무</p>'+
  mDL.map(w=>'<div style="display:flex;gap:8px;align-items:center;font-size:11px;margin-bottom:4px;"><span style="color:#94a3b8;flex-shrink:0;">'+w.deadline.slice(5)+'</span><span style="width:6px;height:6px;border-radius:50%;background:'+(UC[w.userId]||'#999')+';display:inline-block;flex-shrink:0;"></span><span style="color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+w.tasks[0]+'</span></div>').join('')+'</div>':'')+
  '</div>';
}

function formRow(cat1){
  const f=S.form[cat1],cc=CC[cat1]||S.color;
  const editing=S.editId&&S.logs.find(l=>l.id===S.editId)?.cat1===cat1;
  return '<div style="border:1px solid '+(editing?cc:'#e2e8f0')+';border-radius:10px;padding:14px 16px;margin-bottom:10px;background:'+(editing?cc+'06':'#fafafa')+';">'+
  '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">'+
  '<span style="font-size:16px;">'+CI[cat1]+'</span>'+
  '<span style="font-weight:800;font-size:14px;color:'+cc+';">'+cat1+'</span>'+
  (editing?'<span style="font-size:10px;background:'+cc+';color:#fff;padding:1px 6px;border-radius:10px;margin-left:4px;">수정중</span>':'')+
  '</div>'+
  f.tasks.map((t,i)=>'<div style="display:grid;grid-template-columns:130px 1fr 130px 1fr auto;gap:8px;align-items:start;margin-bottom:6px;">'+
  (i===0?'<select onchange="W.fCat2(\''+cat1+'\',this.value)" style="padding:6px 7px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;color:#475569;background:#fff;height:32px;width:100%;">'+
  '<option value="">2차 없음</option>'+S.cat2.map(c=>'<option value="'+c.name+'" '+(f.cat2===c.name?'selected':'')+'>'+c.name+'</option>').join('')+'</select>':'<div></div>')+
  '<div style="display:flex;align-items:center;gap:4px;">'+
  '<span style="font-size:10px;color:#cbd5e1;min-width:14px;text-align:right;">'+(i+1)+'</span>'+
  '<input value="'+t.replace(/"/g,'&quot;')+'" oninput="W.fTask(\''+cat1+'\','+i+',this.value)" placeholder="업무 내용" style="flex:1;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;background:#fff;"/>'+
  (f.tasks.length>1?'<button onclick="W.fRemove(\''+cat1+'\','+i+')" style="border:none;background:none;cursor:pointer;color:#e2e8f0;font-size:13px;flex-shrink:0;">✕</button>':'')+
  '</div>'+
  (i===0?'<input type="date" value="'+f.deadline+'" onchange="W.fDeadline(\''+cat1+'\',this.value)" style="padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;width:100%;height:32px;"/>':'<div></div>')+
  (i===0?'<div><input value="'+(f.memo||'').replace(/"/g,'&quot;')+'" oninput="W.fMemo(\''+cat1+'\',this.value)" placeholder="메모 (차주 진행은 \'차주\' 기재)" style="padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;width:100%;height:32px;"/><p style="font-size:10px;color:#94a3b8;margin:2px 0 0;">💡 차주 진행 필요 업무는 <b>차주</b> 기재</p></div>':'<div></div>')+
  (i===0?'<button onclick="W.save(\''+cat1+'\')" style="padding:6px 12px;background:'+cc+';color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;height:32px;">'+(editing?'수정':'저장')+'</button>':'<div></div>')+
  '</div>').join('')+
  '<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">'+

  (editing?'<button onclick="W.cancelEdit()" style="font-size:11px;color:#64748b;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;">취소</button>':'')+
  '</div></div>';
}

  '<p style="font-size:12px;color:#94a3b8;margin:0 0 14px;">'+uname()+'님, 진행하신 업무를 기록하세요.</p>'+

  (todL.length?todL.map(l=>logCard(l,true)).join(''):'<p style="font-size:12px;color:#94a3b8;margin:0;">오늘 기록 없음</p>')+
  '</div>'+
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:18px;">'+
  '<h3 style="font-size:13px;font-weight:800;color:#0f172a;margin:0 0 12px;">📆 이번주 내 업무 <span style="font-size:11px;font-weight:500;color:#94a3b8;">'+wkL.length+'건</span></h3>'+
  (wkL.length?wkL.map(l=>logCard(l,true)).join(''):'<p style="font-size:12px;color:#94a3b8;margin:0;">이번주 기록 없음</p>')+

// ── 캘린더 탭 ──
function calHTML(){
  const yr=S.calMonth.getFullYear(),mo=S.calMonth.getMonth();
  const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const tdv=td();

  // 캘린더: 기한(deadline) 기준으로 일정 표시
  let cells='';
  for(let i=0;i<fd;i++)cells+='<div style="min-height:75px;"></div>';
  for(let d=1;d<=dim;d++){
    const ds=yr+'-'+pad(mo+1)+'-'+pad(d);
    const schLogs=S.logs.filter(l=>l.deadline===ds); // 기한 기준
    const sel=ds===S.selDate,isT=ds===tdv;
    const uids=[...new Set(schLogs.map(l=>l.userId))];
    cells+='<div onclick="W.selDate(\''+ds+'\')" style="min-height:75px;border:2px solid '+(sel?S.color:isT?S.color+'55':'#e2e8f0')+';border-radius:8px;padding:5px 6px;cursor:pointer;background:'+(isT&&!sel?S.color+'08':'#fff')+';overflow:hidden;">'+
    '<div style="font-size:12px;font-weight:'+(isT?'800':'500')+';color:'+(sel?S.color:isT?S.color:'#334155')+';margin-bottom:3px;">'+d+'</div>'+
    (schLogs.length?'<div style="display:flex;gap:2px;flex-wrap:wrap;margin-bottom:2px;">'+uids.map(uid=>'<span style="width:7px;height:7px;border-radius:50%;background:'+UC[uid]+';display:inline-block;"></span>').join('')+'</div>'+
    '<div style="font-size:10px;color:#64748b;">'+schLogs.length+'건</div>':'')+
    '</div>';
  }

  // 선택일 업무: 기록일(date) 기준 — 기한 여부 무관하게 전부
  const selLogs=S.logs.filter(l=>l.date===S.selDate);
  // 선택일 기한 업무 (마감 표시용)
  const selDLogs=S.logs.filter(l=>l.deadline===S.selDate);
  const selLabel=new Date(S.selDate+'T12:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});

  // 주차별
  const calMon=wMon(S.calWeekOff),calSun=wEnd(calMon);
  const wkLogs=S.logs.filter(l=>inWeek(l.date,calMon,calSun));
  const wopts=[];for(let i=0;i>=-11;i--){const m=wMon(i),s=wEnd(m);wopts.push({off:i,label:(m.getMonth()+1)+'/'+m.getDate()+' ~ '+(s.getMonth()+1)+'/'+s.getDate()});}

  return '<div style="display:flex;flex-direction:column;gap:20px;">'+

  // 1. 캘린더
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:22px;">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
  '<div style="display:flex;gap:8px;">'+
  '<select onchange="W.calYr(this.value)" style="padding:6px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;font-weight:600;">'+[2024,2025,2026].map(y=>'<option '+(yr===y?'selected':'')+' value="'+y+'">'+y+'년</option>').join('')+'</select>'+
  '<select onchange="W.calMo(this.value)" style="padding:6px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;font-weight:600;">'+MN.map((m,i)=>'<option '+(mo===i?'selected':'')+' value="'+i+'">'+m+'</option>').join('')+'</select>'+
  '</div><div style="display:flex;gap:6px;">'+
  '<button onclick="W.prevCal()" style="padding:6px 12px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:14px;color:#64748b;">‹</button>'+
  '<button onclick="W.nextCal()" style="padding:6px 12px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:14px;color:#64748b;">›</button>'+
  '</div></div>'+
  '<p style="font-size:11px;color:#94a3b8;margin:0 0 12px;">📌 기한(마감일) 기준 표시 · 날짜 클릭 시 해당일 기록된 전체 업무 확인</p>'+
  '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;">'+
  ['일','월','화','수','목','금','토'].map((d,i)=>'<div style="text-align:center;font-size:12px;font-weight:700;color:'+(i===0?'#ef4444':i===6?'#3b82f6':'#64748b')+';padding:6px 0;">'+d+'</div>').join('')+
  '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">'+cells+'</div></div>'+

  // 2. 선택일 업무 현황 — 기록일 기준, 담당자 4열 2행
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0;">'+selLabel+' 업무 현황</h3>'+
  '<span style="font-size:12px;color:#64748b;background:#f1f5f9;padding:2px 8px;border-radius:10px;">기록 '+selLogs.length+'건</span>'+
  (selDLogs.length?'<span style="font-size:12px;color:#b91c1c;background:#fee2e2;padding:2px 8px;border-radius:10px;font-weight:600;">📅 마감 '+selDLogs.length+'건</span>':'')+
  '</div>'+
  '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">'+
  MB.map(m=>{
    // 해당일 기록된 업무 (기록일 기준)
    const ml=selLogs.filter(l=>l.userId===m.id);
    // 해당일이 기한인 업무
    const dlM=selDLogs.filter(l=>l.userId===m.id);
    const hasDL=dlM.length>0;
    return '<div style="border:1px solid '+(hasDL?'#fca5a5':'#e2e8f0')+';border-radius:10px;padding:12px;background:'+(hasDL?'#fff8f8':'#fafafa')+';">'+
    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f1f5f9;">'+
    '<span style="width:8px;height:8px;border-radius:50%;background:'+UC[m.id]+';display:inline-block;"></span>'+
    '<span style="font-size:13px;font-weight:800;color:#1e293b;">'+m.name+'</span>'+
    (ml.length?'<span style="font-size:10px;color:#64748b;background:#f1f5f9;padding:1px 5px;border-radius:8px;">'+ml.length+'건</span>':'')+
    (hasDL?'<span style="font-size:10px;color:#b91c1c;background:#fee2e2;padding:1px 5px;border-radius:8px;">마감</span>':'')+
    '</div>'+
    // 기록된 업무가 있으면 표시, 없으면 "업무 없음"
    (ml.length?ml.map(l=>logCard(l,l.userId===S.user)).join(''):
    '<p style="font-size:11px;color:#94a3b8;margin:0;">업무 없음</p>')+
    // 기한 업무는 별도 표시 (기록은 없지만 마감일인 경우)
    (!ml.length&&hasDL?'<div style="margin-top:6px;padding-top:6px;border-top:1px solid #f1f5f9;">'+
    '<p style="font-size:10px;color:#b91c1c;font-weight:600;margin:0 0 4px;">📅 오늘이 마감일인 업무</p>'+
    dlM.map(l=>logCard(l,l.userId===S.user)).join('')+'</div>':'')+
    '</div>';
  }).join('')+'</div></div>'+

  // 3. 주차별 팀 업무
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:22px;">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0;">📆 주차별 진행 업무</h3>'+
  '<select onchange="W.calWeek(this.value)" style="padding:7px 12px;border:2px solid '+S.color+';border-radius:8px;font-size:13px;font-weight:600;color:'+S.color+';background:#fff;cursor:pointer;">'+
  wopts.map(o=>'<option value="'+o.off+'" '+(S.calWeekOff===o.off?'selected':'')+'>'+o.label+'</option>').join('')+'</select></div>'+
  '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">'+
  MB.map(m=>{
    const ml=wkLogs.filter(l=>l.userId===m.id);
    return '<div style="border:1px solid #e2e8f0;border-radius:10px;padding:12px;">'+
    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f1f5f9;">'+
    '<span style="width:8px;height:8px;border-radius:50%;background:'+UC[m.id]+';display:inline-block;"></span>'+
    '<span style="font-size:13px;font-weight:800;color:#1e293b;">'+m.name+'</span>'+
    '<span style="font-size:10px;color:#94a3b8;">'+ml.length+'건</span></div>'+
    (ml.length?ml.map(l=>logCard(l,l.userId===S.user)).join(''):'<p style="font-size:11px;color:#94a3b8;margin:0;">기록 없음</p>')+
    '</div>';
  }).join('')+'</div></div></div>';
}

// ── 주간보고서 ──
function repHTML(){
  const mon=wMon(S.repWeek),sun=wEnd(mon);
  // 해당 주간 기록된 모든 로그 (날짜 문자열 비교)
  const wL=S.logs.filter(l=>inWeek(l.date,mon,sun));
  const nextWL=wL.filter(l=>(l.note||'').includes('차주'));
  // 1차 카테고리별 로그 (모든 로그 포함)
  const ct={};C1.forEach(c=>{ct[c]=wL.filter(l=>l.cat1===c);});
  const nextCt={};C1.forEach(c=>{nextCt[c]=nextWL.filter(l=>l.cat1===c);});
  const wn=Math.ceil((Math.abs(mon-new Date(mon.getFullYear(),0,1))/86400000)/7);
  const wopts=[];for(let i=0;i>=-11;i--){const m=wMon(i),s=wEnd(m);wopts.push({off:i,label:(m.getMonth()+1)+'/'+m.getDate()+' ~ '+(s.getMonth()+1)+'/'+s.getDate()+' ('+m.getFullYear()+')'});}

  // 카테고리 비중: 로그 건수 기준
  const total=wL.length;
  const cat1Stats=C1.map(c=>({cat:c,cnt:ct[c].length,pct:total?Math.round(ct[c].length/total*100):0}));
  const cat2Map={};wL.forEach(l=>{if(l.cat2){cat2Map[l.cat2]=(cat2Map[l.cat2]||0)+1;}});
  const cat2Stats=Object.entries(cat2Map).sort((a,b)=>b[1]-a[1]);

  return '<div style="display:flex;flex-direction:column;gap:16px;">'+
  // 헤더
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">'+
  '<div><h2 style="font-size:18px;font-weight:800;color:#0f172a;margin:0 0 4px;">📊 주간 업무보고서</h2>'+
  '<p style="font-size:12px;color:#94a3b8;margin:0;">'+mon.toLocaleDateString('ko-KR')+' ~ '+sun.toLocaleDateString('ko-KR')+' · '+(mon.getMonth()+1)+'월 '+Math.ceil(mon.getDate()/7)+'주차 · W'+pad(wn)+'</p></div>'+
  '<select onchange="W.repWeek(this.value)" style="padding:8px 14px;border:2px solid '+S.color+';border-radius:8px;font-size:13px;font-weight:600;color:'+S.color+';background:#fff;cursor:pointer;">'+
  wopts.map(o=>'<option value="'+o.off+'" '+(S.repWeek===o.off?'selected':'')+'>'+o.label+'</option>').join('')+'</select></div></div>'+

  // 공지
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0 0 12px;">📢 주요 공지사항</h3>'+
  '<div style="display:flex;gap:8px;margin-bottom:12px;">'+
  '<input id="ni" value="'+S.newNotice.replace(/"/g,'&quot;')+'" oninput="W.noticeIn(this.value)" placeholder="공지사항 입력" style="flex:1;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;"/>'+
  '<button onclick="W.addNotice()" style="padding:8px 16px;background:'+S.color+';color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">등록</button></div>'+
  (S.notices.length?S.notices.map(n=>'<div style="display:flex;justify-content:space-between;border:1px solid #e2e8f0;border-radius:8px;padding:10px 13px;margin-bottom:6px;background:#fafafa;">'+
  '<div><p style="font-size:13px;color:#1e293b;margin:0 0 3px;">'+n.text+'</p><p style="font-size:11px;color:#94a3b8;margin:0;">'+n.author+' · '+n.date+'</p></div>'+
  '<button onclick="W.delNotice(\''+n.id+'\')" style="border:none;background:none;cursor:pointer;color:#cbd5e1;font-size:15px;margin-left:8px;">✕</button></div>').join(''):'<p style="font-size:12px;color:#94a3b8;">등록된 공지사항이 없습니다.</p>')+
  '</div>'+

  // 이번주 진행 업무 (모든 로그 전부)
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0 0 14px;">1. 이번주 주요 진행 업무 <span style="font-size:12px;color:#94a3b8;font-weight:400;">총 '+total+'건</span></h3>'+
  '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">'+
  C1.map(c=>'<div style="border-left:3px solid '+CC[c]+';padding-left:12px;">'+
  '<h4 style="font-size:13px;font-weight:800;color:'+CC[c]+';margin:0 0 8px;">'+CI[c]+' '+c+' <span style="font-size:11px;color:#94a3b8;font-weight:500;">'+ct[c].length+'건</span></h4>'+
  (ct[c].length?ct[c].map(l=>logCard(l,l.userId===S.user)).join(''):'<p style="font-size:12px;color:#94a3b8;">기록 없음</p>')+
  '</div>').join('')+'</div></div>'+

  // 차주 예정
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0 0 4px;">2. 차주 진행 예정 업무</h3>'+
  '<p style="font-size:11px;color:#94a3b8;margin:0 0 14px;">메모에 <b>차주</b> 키워드가 포함된 업무만 표시</p>'+
  '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">'+
  C1.map(c=>'<div style="border-left:3px solid '+CC[c]+'55;padding-left:12px;">'+
  '<h4 style="font-size:13px;font-weight:800;color:'+CC[c]+';margin:0 0 8px;opacity:.8;">'+CI[c]+' '+c+' <span style="font-size:11px;color:#94a3b8;font-weight:500;">'+nextCt[c].length+'건</span></h4>'+
  (nextCt[c].length?nextCt[c].map(l=>logCard(l,l.userId===S.user)).join(''):'<p style="font-size:12px;color:#94a3b8;">해당 없음</p>')+
  '</div>').join('')+'</div></div>'+

  // 카테고리 비중
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0 0 16px;">📈 카테고리별 업무 비중 <span style="font-size:12px;color:#94a3b8;font-weight:400;">로그 건수 기준</span></h3>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">'+
  '<div><p style="font-size:12px;font-weight:700;color:#475569;margin:0 0 10px;">1차 카테고리</p>'+
  (total===0?'<p style="font-size:12px;color:#94a3b8;">데이터 없음</p>':
  cat1Stats.map(s=>'<div style="margin-bottom:12px;">'+
  '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">'+
  '<span style="font-size:12px;font-weight:600;color:#334155;">'+CI[s.cat]+' '+s.cat+'</span>'+
  '<span style="font-size:12px;font-weight:700;color:'+CC[s.cat]+';"> '+s.pct+'% ('+s.cnt+'건)</span></div>'+
  '<div style="height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;">'+
  '<div style="height:100%;background:'+CC[s.cat]+';border-radius:5px;width:'+s.pct+'%;"></div></div></div>').join(''))+
  '</div>'+
  '<div><p style="font-size:12px;font-weight:700;color:#475569;margin:0 0 10px;">2차 카테고리</p>'+
  (cat2Stats.length===0?'<p style="font-size:12px;color:#94a3b8;">2차 카테고리 데이터 없음</p>':
  (()=>{const mx=cat2Stats[0][1];return cat2Stats.map(([nm,cnt])=>'<div style="margin-bottom:12px;">'+
  '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">'+
  '<span style="font-size:12px;font-weight:600;color:#334155;">'+nm+'</span>'+
  '<span style="font-size:12px;font-weight:700;color:'+S.color+';">'+cnt+'건 ('+Math.round(cnt/total*100)+'%)</span></div>'+
  '<div style="height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;">'+
  '<div style="height:100%;background:'+S.color+';border-radius:5px;width:'+Math.round(cnt/mx*100)+'%;"></div></div></div>').join('');})())+
  '</div></div></div>'+

  // 팀원별 (맨 하단)
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0 0 14px;">3. 팀원별 주간 업무</h3>'+
  '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">'+
  MB.map(m=>{
    const ml=wL.filter(l=>l.userId===m.id);
    return '<div style="border:1px solid #e2e8f0;border-radius:10px;padding:12px;">'+
    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f1f5f9;">'+
    '<span style="width:8px;height:8px;border-radius:50%;background:'+UC[m.id]+';display:inline-block;"></span>'+
    '<span style="font-size:13px;font-weight:800;color:#1e293b;">'+m.name+'</span>'+
    '<span style="font-size:10px;color:#94a3b8;">'+ml.length+'건</span></div>'+
    (ml.length?ml.map(l=>logCard(l,l.userId===S.user)).join(''):'<p style="font-size:11px;color:#94a3b8;margin:0;">기록 없음</p>')+
    '</div>';
  }).join('')+'</div></div></div>';
}

// ── 향후 일정 ──
function futHTML(){
  const withDL=S.logs.filter(l=>l.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  const withoutDL=S.logs.filter(l=>!l.deadline&&hasFKW(l));
  return '<div style="display:flex;flex-direction:column;gap:16px;">'+
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<h2 style="font-size:20px;font-weight:800;color:#0f172a;margin:0 0 4px;">🎯 향후 일정</h2>'+
  '<p style="font-size:12px;color:#94a3b8;margin:0;">기한 업무 및 추후 진행 필요 업무를 표시합니다.</p></div>'+
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0 0 14px;">⏰ 기한이 있는 업무 <span style="font-size:13px;color:#94a3b8;font-weight:500;">'+withDL.length+'건</span></h3>'+
  (withDL.length?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;">'+
  withDL.map(l=>{const dl=dLeft(l.deadline),urg=dl<=3&&dl>=0,isMine=l.userId===S.user;
  return'<div style="border:1px solid '+(urg?'#fca5a5':'#e2e8f0')+';border-radius:10px;padding:13px;background:'+(urg?'#fff1f2':'#fff')+';">'+
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;">'+
  '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">'+
  '<span style="width:7px;height:7px;border-radius:50%;background:'+UC[l.userId]+';display:inline-block;"></span>'+
  badge(l.cat1||'기타',l.cat2||'')+'<span style="font-size:12px;font-weight:700;color:#1e293b;">'+l.userName+'</span></div>'+
  ctrl(l,isMine)+'</div>'+
  '<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:6px;background:'+(urg?'#fee2e2':'#dbeafe')+';color:'+(urg?'#b91c1c':'#1d4ed8')+';">📅 '+l.deadline+' '+(dl<0?'(기한지남)':dl===0?'(오늘)':'('+dl+'일 남음)')+'</span>'+
  '<ul>'+l.tasks.map(t=>'<li style="font-size:11px;color:#475569;">'+t+'</li>').join('')+'</ul></div>';}).join('')+'</div>':'<p style="font-size:12px;color:#94a3b8;">없습니다.</p>')+
  '</div>'+
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;">'+
  '<h3 style="font-size:15px;font-weight:800;color:#0f172a;margin:0 0 5px;">📋 추후 진행 필요 업무 <span style="font-size:13px;color:#94a3b8;font-weight:500;">'+withoutDL.length+'건</span></h3>'+
  '<p style="font-size:11px;color:#94a3b8;margin:0 0 14px;">예정·필요·계획·검토·준비 등 키워드 포함 업무</p>'+
  (withoutDL.length?'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;">'+
  withoutDL.map(l=>{const isMine=l.userId===S.user;return'<div style="border:1px solid #e2e8f0;border-radius:10px;padding:13px;background:#fff;">'+
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;">'+
  '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">'+
  '<span style="width:7px;height:7px;border-radius:50%;background:'+UC[l.userId]+';display:inline-block;"></span>'+
  badge(l.cat1||'기타',l.cat2||'')+'<span style="font-size:12px;font-weight:700;color:#1e293b;">'+l.userName+'</span></div>'+
  ctrl(l,isMine)+'</div>'+
  '<ul>'+l.tasks.map(t=>'<li style="font-size:11px;color:#475569;">'+t+'</li>').join('')+'</ul>'+
  (l.note?'<p style="font-size:11px;color:#94a3b8;margin:4px 0 0;font-style:italic;">📌 '+l.note+'</p>':'')+
  '</div>';}).join('')+'</div>':'<p style="font-size:12px;color:#94a3b8;">해당되는 업무가 없습니다.</p>')+
  '</div></div>';
}

// ── 설정 ──
function setHTML(){
  return '<div style="max-width:520px;"><div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:26px;">'+
  '<h2 style="font-size:18px;font-weight:800;color:#0f172a;margin:0 0 4px;">⚙️ 설정</h2>'+
  '<p style="font-size:12px;color:#94a3b8;margin:0 0 22px;">2차 카테고리 및 앱 설정을 관리합니다.</p>'+
  '<h3 style="font-size:14px;font-weight:700;color:#1e293b;margin:0 0 10px;">2차 카테고리 관리</h3>'+
  '<div style="display:flex;gap:8px;margin-bottom:12px;">'+
  '<input id="c2i" value="'+S.newCat2.replace(/"/g,'&quot;')+'" oninput="W.cat2In(this.value)" placeholder="새 2차 카테고리 입력" style="flex:1;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;"/>'+
  '<button onclick="W.addCat2()" style="padding:8px 16px;background:'+S.color+';color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">추가</button></div>'+
  (S.cat2.length?S.cat2.map(c=>'<div style="display:flex;align-items:center;gap:8px;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;margin-bottom:6px;">'+
  (S.editCat2===c.id?'<input value="'+S.editCat2Val.replace(/"/g,'&quot;')+'" oninput="W.cat2EV(this.value)" style="flex:1;padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;"/>'+
  '<button onclick="W.saveCat2()" style="padding:4px 12px;background:'+S.color+';color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;">저장</button>'+
  '<button onclick="W.cancelCat2()" style="padding:4px 10px;background:#f1f5f9;color:#64748b;border:none;border-radius:6px;font-size:12px;cursor:pointer;">취소</button>':
  '<span style="flex:1;font-size:14px;color:#1e293b;">'+c.name+'</span>'+
  '<button onclick="W.editCat2(\''+c.id+'\',\''+c.name+'\')" style="border:none;background:none;cursor:pointer;color:#94a3b8;font-size:15px;padding:2px 5px;">✎</button>'+
  '<button onclick="W.delCat2(\''+c.id+'\')" style="border:none;background:none;cursor:pointer;color:#94a3b8;font-size:15px;padding:2px 5px;">✕</button>')+
  '</div>').join(''):'<p style="font-size:12px;color:#94a3b8;margin-bottom:16px;">등록된 2차 카테고리가 없습니다.</p>')+
  '<hr style="border:none;border-top:1px solid #f1f5f9;margin:20px 0;"/>'+
  '<h3 style="font-size:14px;font-weight:700;color:#1e293b;margin:0 0 10px;">담당자 색상</h3>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:20px;">'+
  MB.map(m=>'<div style="display:flex;align-items:center;gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:'+UC[m.id]+';display:inline-block;"></span><span style="font-size:13px;color:#334155;">'+m.name+'</span></div>').join('')+
  '</div><h3 style="font-size:14px;font-weight:700;color:#1e293b;margin:0 0 10px;">1차 카테고리</h3>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">'+
  C1.map(c=>'<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:16px;">'+CI[c]+'</span><span style="font-size:13px;color:#334155;font-weight:600;">'+c+'</span></div>').join('')+
  '</div></div></div>';
}

const W={
  login:id=>{S.user=id;S.color=UC[id];draw();},
  logout:()=>{S.user=null;S.color=null;draw();},
  view:v=>{S.view=v;draw();},
  selDate:d=>{S.selDate=d;draw();},
  prevMyCal:()=>{S.myCalMonth=new Date(S.myCalMonth.getFullYear(),S.myCalMonth.getMonth()-1);draw();},
  nextMyCal:()=>{S.myCalMonth=new Date(S.myCalMonth.getFullYear(),S.myCalMonth.getMonth()+1);draw();},
  prevCal:()=>{S.calMonth=new Date(S.calMonth.getFullYear(),S.calMonth.getMonth()-1);draw();},
  nextCal:()=>{S.calMonth=new Date(S.calMonth.getFullYear(),S.calMonth.getMonth()+1);draw();},
  calYr:y=>{S.calMonth=new Date(parseInt(y),S.calMonth.getMonth());draw();},
  calMo:m=>{S.calMonth=new Date(S.calMonth.getFullYear(),parseInt(m));draw();},
  calWeek:v=>{S.calWeekOff=parseInt(v);draw();},
  fTask:(c,i,v)=>{S.form[c].tasks[i]=v;},
  fAdd:c=>{S.form[c].tasks.push('');draw();},
  fRemove:(c,i)=>{S.form[c].tasks.splice(i,1);draw();},
  fCat2:(c,v)=>{S.form[c].cat2=v;},
  fDeadline:(c,v)=>{S.form[c].deadline=v;},
  fMemo:(c,v)=>{S.form[c].memo=v;},
  save:c=>saveLog(c),
  cancelEdit:()=>{S.editId=null;C1.forEach(c=>{S.form[c]=ef();});draw();},
  done:id=>toggleDone(id),
  edit:id=>startEdit(id),
  copy:id=>copyLog(id),
  del:id=>{S.delId=id;draw();},
  doDel:()=>doDel(),
  cancelDel:()=>{S.delId=null;draw();},
  addCat2:()=>addCat2(),
  delCat2:id=>delCat2(id),
  editCat2:(id,val)=>{S.editCat2=id;S.editCat2Val=val;draw();},
  saveCat2:()=>saveCat2Edit(),
  cancelCat2:()=>{S.editCat2=null;S.editCat2Val='';draw();},
  cat2In:v=>{S.newCat2=v;},
  cat2EV:v=>{S.editCat2Val=v;},
  addNotice:()=>addNotice(),
  delNotice:id=>delNotice(id),
  noticeIn:v=>{S.newNotice=v;},
  repWeek:v=>{S.repWeek=parseInt(v);draw();},
};
window.W=W;
draw();
</script>
</body>
</html>
