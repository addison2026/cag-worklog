<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CAG마케팅유닛 워크로그</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>
<style>
*{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;box-sizing:border-box;}
body{margin:0;padding:0;background:#f1f5f9;}
button,input,select{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;}
input:focus,select:focus{outline:none;}
ul{margin:0;padding-left:14px;}
li{margin-bottom:2px;}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot,query,orderBy,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyCBUprzRAVme2c4DlDH2JRV6blPmQ7awnM",authDomain:"cag-mkt-worklog.firebaseapp.com",projectId:"cag-mkt-worklog",storageBucket:"cag-mkt-worklog.firebasestorage.app",messagingSenderId:"318995097468",appId:"1:318995097468:web:0934b2591bfe66be9fa6f9"};
const db=getFirestore(initializeApp(FB));

const C1=['VD글로벌','VD중국','마영전','기타'];
const CI={'VD글로벌':'🌍','VD중국':'🇨🇳','마영전':'📊','기타':'📌'};
const CC={'VD글로벌':'#3b82f6','VD중국':'#ef4444','마영전':'#10b981','기타':'#8b5cf6'};
const UC={user1:'#3b82f6',user2:'#ef4444',user3:'#10b981',user4:'#a855f7',user5:'#f97316',user6:'#ec4899',user7:'#06b6d4',user8:'#f59e0b'};
const MB=[{id:'user1',name:'한지혜'},{id:'user2',name:'김지선'},{id:'user3',name:'이소연'},{id:'user4',name:'박수민'},{id:'user5',name:'유은지'},{id:'user6',name:'김민정'},{id:'user7',name:'권세봉'},{id:'user8',name:'전룡'}];
const FK=['예정','필요','계획','검토','추진','준비','논의','협의','요청','대기','보류','예상'];

function emptyForm(){return{tasks:[''],cat2:'',deadline:'',memo:''};}
const S={
  user:null,color:null,view:'my',
  selDate:today(),
  calMonth:new Date(),myCalMonth:new Date(),
  logs:[],cat2:[],notices:[],
  form:{VD글로벌:emptyForm(),VD중국:emptyForm(),마영전:emptyForm(),기타:emptyForm()},
  editId:null,delId:null,
  newCat2:'',editCat2:null,editCat2Val:'',
  newNotice:'',repWeek:0,
};

onSnapshot(query(collection(db,'worklogs'),orderBy('createdAt','desc')),s=>{S.logs=s.docs.map(d=>({id:d.id,...d.data()}));draw();});
onSnapshot(doc(db,'settings','cat2'),s=>{S.cat2=s.exists()?(s.data().list||[]):[];draw();});
onSnapshot(doc(db,'settings','notices'),s=>{S.notices=s.exists()?(s.data().list||[]):[];draw();});

function today(){return new Date().toISOString().split('T')[0];}
function nowStr(){const d=new Date();return today()+' '+pad(d.getHours())+':'+pad(d.getMinutes());}
function pad(n){return String(n).padStart(2,'0');}
function uname(id){return MB.find(m=>m.id===(id||S.user))?.name||'';}
function weekMon(off){const t=new Date(),m=new Date(t);m.setDate(t.getDate()-((t.getDay()+6)%7)+(off*7));m.setHours(0,0,0,0);return m;}
function weekEnd(m){const e=new Date(m);e.setDate(m.getDate()+6);e.setHours(23,59,59,999);return e;}
function dLeft(dl){return Math.ceil((new Date(dl)-new Date())/86400000);}
function hasFKW(log){const t=[...(log.tasks||[]),log.note||''].join(' ');return FK.some(k=>t.includes(k));}

function badge(c1,c2){
  const ic=CI[c1]||'📌',cc=CC[c1]||'#64748b';
  return '<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;background:'+cc+'18;color:'+cc+';font-size:11px;font-weight:700;border:1px solid '+cc+'33;">'+ic+' '+c1+(c2?' › '+c2:'')+'</span>';
}

async function saveLog(cat1){
  const f=S.form[cat1],tasks=f.tasks.filter(t=>t.trim());
  if(!tasks.length){alert(cat1+' 업무 내용을 입력하세요.');return;}
  const data={userId:S.user,userName:uname(),date:today(),time:nowStr(),cat1,cat2:f.cat2||'',tasks,completed:false,deadline:f.deadline||'',note:f.memo||'',createdAt:new Date().toISOString()};
  if(S.editId){await updateDoc(doc(db,'worklogs',S.editId),data);S.editId=null;}
  else{await addDoc(collection(db,'worklogs'),data);}
  S.form[cat1]=emptyForm();draw();
}
async function doDel(){if(S.delId){await deleteDoc(doc(db,'worklogs',S.delId));S.delId=null;draw();}}
async function toggleDone(id){const l=S.logs.find(w=>w.id===id);if(l)await updateDoc(doc(db,'worklogs',id),{completed:!l.completed});}
function startEdit(id){
  const l=S.logs.find(w=>w.id===id);if(!l)return;
  S.editId=id;S.form[l.cat1]={tasks:[...l.tasks],cat2:l.cat2||'',deadline:l.deadline||'',memo:l.note||''};draw();
}
function copyLog(id){
  const l=S.logs.find(w=>w.id===id);if(!l)return;
  navigator.clipboard.writeText('['+l.userName+'] '+l.date+'\n['+l.cat1+(l.cat2?' › '+l.cat2:'')+' ]\n'+l.tasks.join('\n')+(l.deadline?'\n기한: '+l.deadline:'')+(l.note?'\n메모: '+l.note:''));
  alert('복사됐습니다!');
}
async function addCat2(){const v=S.newCat2.trim();if(!v)return;await setDoc(doc(db,'settings','cat2'),{list:[...S.cat2,{id:Date.now()+'',name:v}]});S.newCat2='';draw();}
async function delCat2(id){await setDoc(doc(db,'settings','cat2'),{list:S.cat2.filter(c=>c.id!==id)});}
async function saveCat2Edit(){await setDoc(doc(db,'settings','cat2'),{list:S.cat2.map(c=>c.id===S.editCat2?{...c,name:S.editCat2Val}:c)});S.editCat2=null;S.editCat2Val='';draw();}
async function addNotice(){const v=S.newNotice.trim();if(!v)return;await setDoc(doc(db,'settings','notices'),{list:[...S.notices,{id:Date.now()+'',text:v,author:uname(),date:today()}]});S.newNotice='';draw();}
async function delNotice(id){await setDoc(doc(db,'settings','notices'),{list:S.notices.filter(n=>n.id!==id)});}

// ── DRAW ──
function draw(){document.getElementById('app').innerHTML=S.user?appHTML():loginHTML();}

function loginHTML(){
  return '<div style="min-height:100vh;background:linear-gradient(135deg,#eff6ff,#e0e7ff);display:flex;align-items:center;justify-content:center;padding:16px;">'+
  '<div style="background:#fff;border-radius:20px;box-shadow:0 25px 60px rgba(0,0,0,.12);padding:36px;max-width:400px;width:100%;">'+
  '<div style="text-align:center;margin-bottom:28px;"><div style="font-size:44px;margin-bottom:10px;">📋</div>'+
  '<h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0 0 6px;">CAG마케팅유닛 워크로그</h1>'+
  '<p style="color:#94a3b8;font-size:14px;margin:0;">팀원을 선택해 로그인하세요</p></div>'+
  '<div style="display:flex;flex-direction:column;gap:8px;">'+
  MB.map(m=>'<button onclick="W.login(\''+m.id+'\')" style="padding:13px 16px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;text-align:left;cursor:pointer;font-size:14px;font-weight:600;color:#1e293b;display:flex;align-items:center;gap:10px;" onmouseover="this.style.borderColor=\''+UC[m.id]+'\'" onmouseout="this.style.borderColor=\'#e2e8f0\'">'+
    '<span style="width:12px;height:12px;border-radius:50%;background:'+UC[m.id]+';display:inline-block;flex-shrink:0;"></span>'+m.name+'</button>').join('')+
  '</div></div></div>';
}

function appHTML(){
  const tabs=[{id:'my',l:'📝 나의 업무'},{id:'calendar',l:'📅 캘린더'},{id:'report',l:'📊 주간보고서'},{id:'future',l:'🎯 향후 일정'},{id:'settings',l:'⚙️ 설정'}];
  let body='';
  if(S.view==='my')body=myHTML();
  else if(S.view==='calendar')body=calHTML();
  else if(S.view==='report')body=repHTML();
  else if(S.view==='future')body=futHTML();
  else if(S.view==='settings')body=setHTML();
  return (S.delId?delModal():'')+
  '<div style="min-height:100vh;background:#f1f5f9;">'+
  '<div style="background:'+S.color+';position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);">'+
  '<div style="max-width:1400px;margin:0 auto;padding:13px 28px;display:flex;justify-content:space-between;align-items:center;">'+
  '<h1 style="color:#fff;font-size:17px;font-weight:800;margin:0;">CAG마케팅유닛 워크로그</h1>'+
  '<div style="display:flex;align-items:center;gap:12px;"><span style="color:#fff;font-weight:700;font-size:14px;">'+uname()+'</span>'+
  '<button onclick="W.logout()" style="color:rgba(255,255,255,.75);font-size:12px;background:rgba(255,255,255,.15);border:none;cursor:pointer;padding:4px 10px;border-radius:6px;">로그아웃</button></div></div></div>'+
  '<div style="max-width:1400px;margin:0 auto;padding:0 28px 40px;">'+
  '<div style="display:flex;gap:2px;border-bottom:2px solid #e2e8f0;margin-bottom:22px;background:#fff;overflow-x:auto;">'+
  tabs.map(t=>'<button onclick="W.view(\''+t.id+'\')" style="padding:12px 18px;font-size:13px;font-weight:600;white-space:nowrap;background:none;border:none;cursor:pointer;border-bottom:3px solid '+(S.view===t.id?S.color:'transparent')+';color:'+(S.view===t.id?S.color:'#64748b')+';margin-bottom:-2px;">'+t.l+'</button>').join('')+
  '</div>'+body+'</div></div>';
}

function delModal(){
  return '<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;">'+
  '<div style="background:#fff;border-radius:14px;padding:26px;max-width:310px;width:90%;box-shadow:0 25px 60px rgba(0,0,0,.25);">'+
  '<h3 style="font-size:17px;font-weight:800;color:#0f172a;margin:0 0 8px;">🗑 삭제 확인</h3>'+
  '<p style="color:#64748b;font-size:13px;margin:0 0 20px;line-height:1.6;">정말로 삭제하시겠습니까?<br>삭제된 업무는 복구할 수 없습니다.</p>'+
  '<div style="display:flex;gap:8px;">'+
  '<button onclick="W.doDel()" style="flex:1;padding:10px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;">삭제</button>'+
  '<button onclick="W.cancelDel()" style="flex:1;padding:10px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;">취소</button>'+
  '</div></div></div>';
}

function logCard(log,mine){
  const dl=log.deadline?dLeft(log.deadline):null;
  const urg=dl!==null&&dl<=3&&dl>=0;
  return '<div style="border:1px solid '+(urg?'#fca5a5':'#e2e8f0')+';border-radius:8px;padding:11px 13px;margin-bottom:8px;background:'+(urg?'#fff1f2':'#fff')+';">'+
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;gap:4px;flex-wrap:wrap;">'+
  '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">'+
  badge(log.cat1||'기타',log.cat2||'')+
  '<span style="font-size:11px;color:#94a3b8;">'+log.time+'</span>'+
  (log.deadline?'<span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;background:'+(urg?'#fee2e2':'#dbeafe')+';color:'+(urg?'#b91c1c':'#1d4ed8')+';">📅 '+log.deadline+' '+(dl===0?'(오늘)':dl<0?'(기한지남)':'('+dl+'일)')+'</span>':'')+
  '</div>'+
  (mine?'<div style="display:flex;gap:1px;flex-shrink:0;">'+
  '<button onclick="W.done(\''+log.id+'\')" style="padding:3px 6px;border:none;background:none;cursor:pointer;font-size:14px;color:'+(log.completed?'#16a34a':'#cbd5e1')+';">✓</button>'+
  '<button onclick="W.edit(\''+log.id+'\')" style="padding:3px 6px;border:none;background:none;cursor:pointer;font-size:13px;color:#cbd5e1;">✎</button>'+
  '<button onclick="W.copy(\''+log.id+'\')" style="padding:3px 6px;border:none;background:none;cursor:pointer;font-size:13px;color:#cbd5e1;">⎘</button>'+
  '<button onclick="W.del(\''+log.id+'\')" style="padding:3px 6px;border:none;background:none;cursor:pointer;font-size:13px;color:#cbd5e1;">✕</button>'+
  '</div>':'')+
  '</div>'+
  '<ul>'+log.tasks.map(t=>'<li style="font-size:12px;color:'+(log.completed?'#94a3b8':'#334155')+';'+(log.completed?'text-decoration:line-through;':'')+'">'+t+'</li>').join('')+'</ul>'+
  (log.note?'<p style="font-size:11px;color:#94a3b8;margin:4px 0 0;font-style:italic;">📌 '+log.note+'</p>':'')+
  '</div>';
}

function miniCal(mDate,dlLogs){
  const yr=mDate.getFullYear(),mo=mDate.getMonth();
  const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DN=['일','월','화','수','목','금','토'];
  const td=today();
  let cells='';
  for(let i=0;i<fd;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=yr+'-'+pad(mo+1)+'-'+pad(d);
    const dl=dlLogs.filter(w=>w.deadline===ds);
    const sel=ds===S.selDate,isT=ds===td;
    cells+='<div onclick="W.selDate(\''+ds+'\')" title="'+(dl.length?dl.map(l=>l.tasks[0]).join(', '):'')+'" style="position:relative;text-align:center;padding:5px 2px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:'+(isT||sel?'700':'400')+';background:'+(sel?S.color:isT?S.color+'18':'transparent')+';color:'+(sel?'#fff':isT?S.color:'#334155')+';border:1px solid '+(sel?S.color:isT?S.color+'44':'transparent')+';">'+d+
    (dl.length?'<div style="display:flex;justify-content:center;gap:1px;margin-top:1px;">'+dl.slice(0,3).map(l=>'<span style="width:5px;height:5px;border-radius:50%;background:'+(sel?'#fff':UC[l.userId]||S.color)+';display:inline-block;"></span>').join('')+'</div>':'<div style="height:6px;"></div>')+
    '</div>';
  }
  const mDL=dlLogs.filter(w=>w.deadline&&w.deadline.startsWith(yr+'-'+pad(mo+1))).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  return '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:18px 16px;margin-bottom:18px;">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'+
  '<button onclick="W.prevMyCal()" style="width:28px;height:28px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:16px;color:#64748b;">‹</button>'+
  '<span style="font-weight:800;font-size:15px;color:#0f172a;">'+yr+'년 '+MN[mo]+'</span>'+
  '<button onclick="W.nextMyCal()" style="width:28px;height:28px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:16px;color:#64748b;">›</button>'+
  '</div>'+
  '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;">'+
  DN.map((d,i)=>'<div style="text-align:center;font-size:11px;font-weight:700;color:'+(i===0?'#ef4444':i===6?'#3b82f6':'#94a3b8')+';padding:3px 0;">'+d+'</div>').join('')+
  '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">'+cells+'</div>'+
  (mDL.length?'<div style="margin-top:14px;padding-top:12px;border-top:1px solid #f1f5f9;"><p style="font-size:11px;font-weight:700;color:#64748b;margin:0 0 7px;">이번달 기한 업무</p>'+
  mDL.map(w=>'<div style="display:flex;gap:8px;align-items:center;font-size:11px;margin-bottom:4px;"><span style="color:#94a3b8;flex-shrink:0;">'+w.deadline.slice(5)+'</span><span style="width:6px;height:6px;border-radius:50%;background:'+(UC[w.userId]||'#999')+';display:inline-block;flex-shrink:0;"></span><span style="color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+w.tasks[0]+'</span></div>').join('')+'</div>':'')+
  '</div>';
}

function formBlock(cat1){
  const f=S.form[cat1],cc=CC[cat1]||S.color;
  const editing=S.editId&&S.logs.find(l=>l.id===S.editId)?.cat1===cat1;
  return '<div style="border:1px solid '+(editing?cc+'88':'#e2e8f0')+';border-radius:10px;padding:14px;background:'+(editing?cc+'06':'#fafafa')+';">'+
  '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">'+
  '<span style="font-size:16px;">'+CI[cat1]+'</span>'+
  '<span style="font-weight:800;font-size:13px;color:'+cc+';">'+cat1+'</span>'+
  (editing?'<span style="font-size:10px;background:'+cc+';color:#fff;padding:1px 6px;border-radius:10px;">수정중</span>':'')+
  '</div>'+
  '<select onchange="W.fCat2(\''+cat1+'\',this.value)" style="width:100%;padding:5px 7px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;color:#475569;background:#fff;margin-bottom:7px;">'+
  '<option value="">2차 카테고리 없음</option>'+
  S.cat2.map(c=>'<option value="'+c.name+'" '+(f.cat2===c.name?'selected':'')+'>'+c.name+'</option>').join('')+
  '</select>'+
  f.tasks.map((t,i)=>'<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center;">'+
    '<span style="font-size:10px;color:#cbd5e1;width:14px;text-align:right;">'+( i+1)+'</span>'+
    '<input value="'+t.replace(/"/g,'&quot;')+'" oninput="W.fTask(\''+cat1+'\','+i+',this.value)" placeholder="업무 내용" style="flex:1;padding:5px 7px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;background:#fff;min-width:0;width:100%;"/>'+
    (f.tasks.length>1?'<button onclick="W.fRemove(\''+cat1+'\','+i+')" style="border:none;background:none;cursor:pointer;color:#e2e8f0;font-size:13px;padding:0 2px;flex-shrink:0;">✕</button>':'')+
  '</div>').join('')+
  '<button onclick="W.fAdd(\''+cat1+'\')" style="font-size:11px;color:'+cc+';background:none;border:none;cursor:pointer;padding:2px 0;margin-bottom:8px;display:block;">+ 추가</button>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">'+
  '<input type="date" value="'+f.deadline+'" onchange="W.fDeadline(\''+cat1+'\',this.value)" style="padding:5px 7px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;width:100%;"/>'+
  '<input value="'+(f.memo||'').replace(/"/g,'&quot;')+'" oninput="W.fMemo(\''+cat1+'\',this.value)" placeholder="메모" style="padding:5px 7px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;width:100%;"/>'+
  '</div>'+
  '<button onclick="W.save(\''+cat1+'\')" style="width:100%;padding:7px;background:'+cc+';color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;">'+(editing?'수정 완료':'저장')+'</button>'+
  (editing?'<button onclick="W.cancelEdit()" style="width:100%;padding:6px;background:#f1f5f9;color:#64748b;border:none;border-radius:7px;font-size:12px;cursor:pointer;margin-top:4px;">취소</button>':'')+
  '</div>';
}

function myHTML(){
  const td=today(),mon=weekMon(0),sun=weekEnd(mon);
  const myL=S.logs.filter(l=>l.userId===S.user);
  const myDL=myL.filter(l=>l.deadline);
  const todL=myL.filter(l=>l.date===td);
  const wkL=myL.filter(l=>{const d=new Date(l.date);return d>=mon&&d<=sun;});
  return '<div style="display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start;">'+
  '<div>'+miniCal(S.myCalMonth,myDL)+'</div>'+
  '<div>'+
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;margin-bottom:18px;">'+

function calHTML(){
  const yr=S.calMonth.getFullYear(),mo=S.calMonth.getMonth();
  const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const td=today();
  let cells='';
  for(let i=0;i<fd;i++)cells+='<div style="min-height:80px;"></div>';
  for(let d=1;d<=dim;d++){
    const ds=yr+'-'+pad(mo+1)+'-'+pad(d);
    const dl=S.logs.filter(l=>l.deadline===ds);
    const sel=ds===S.selDate,isT=ds===td;

    cells+='<div onclick="W.selDate(\''+ds+'\')" style="min-height:80px;border:1px solid '+(sel?S.color:isT?S.color+'66':'#e2e8f0')+';border-radius:8px;padding:6px;cursor:pointer;background:'+(sel?S.color:isT?S.color+'0d':'#fff')+';overflow:hidden;">'+
    '<div style="font-size:12px;font-weight:'+(isT?'800':'500')+';color:'+(sel?'#fff':isT?S.color:'#334155')+';margin-bottom:3px;">'+d+'</div>'+
    (dl.length?'<div style="display:flex;gap:2px;flex-wrap:wrap;margin-bottom:2px;">'+uids.map(uid=>'<span style="width:7px;height:7px;border-radius:50%;background:'+(sel?'rgba(255,255,255,.8)':UC[uid]||'#999')+';display:inline-block;"></span>').join('')+'</div>'+

  return '<div style="display:grid;grid-template-columns:1fr 290px;gap:20px;">'+
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:22px;">'+

  '<select onchange="W.calMo(this.value)" style="padding:6px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;font-weight:600;">'+MN.map((m,i)=>'<option '+(mo===i?'selected':'')+' value="'+i+'">'+m+'</option>').join('')+'</select>'+
  '</div><div style="display:flex;gap:6px;">'+
  '<button onclick="W.prevCal()" style="padding:6px 12px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:14px;color:#64748b;">‹</button>'+
  '<button onclick="W.nextCal()" style="padding:6px 12px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:14px;color:#64748b;">›</button>'+
  '</div></div>'+

  '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;">'+
  ['일','월','화','수','목','금','토'].map((d,i)=>'<div style="text-align:center;font-size:12px;font-weight:700;color:'+(i===0?'#ef4444':i===6?'#3b82f6':'#64748b')+';padding:6px 0;">'+d+'</div>').join('')+
  '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">'+cells+'</div></div>'+
  '<div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:18px;height:fit-content;">'+
  '<h3 style="font-size:13px;font-weight:800;color:#0f172a;margin:0 0 12px;">'+new Date(S.selDate+'T12:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})+' 기한</h3>'+
  (selL.length?selL.map(l=>'<div style="border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:8px;">'+

  '<h3 style="font-size:14px;font-weight:700;color:#1e293b;margin:0 0 10px;">1차 카테고리</h3>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">'+
  C1.map(c=>'<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:16px;">'+CI[c]+'</span><span style="font-size:13px;color:#334155;font-weight:600;">'+c+'</span><span style="width:8px;height:8px;border-radius:50%;background:'+CC[c]+';display:inline-block;"></span></div>').join('')+
  '</div></div></div>';
}

// ── Global ──
const W={
  login:id=>{S.user=id;S.color=UC[id];draw();},
  logout:()=>{S.user=null;S.color=null;draw();},
  view:v=>{S.view=v;draw();},
  selDate:d=>{S.selDate=d;draw();},
  prevMyCal:()=>{S.myCalMonth=new Date(S.myCalMonth.getFullYear(),S.myCalMonth.getMonth()-1);draw();},
  nextMyCal:()=>{S.myCalMonth=new Date(S.myCalMonth.getFullYear(),S.myCalMonth.getMonth()+1);draw();},
  prevCal:()=>{S.calMonth=new Date(S.calMonth.getFullYear(),S.calMonth.getMonth()-1);draw();},
  nextCal:()=>{S.calMonth=new Date(S.calMonth.getFullYear(),S.calMonth.getMonth()+1);draw();},
  calYr:y=>{S.calMonth=new Date(parseInt(y),S.calMonth.getMonth());draw();},
  calMo:m=>{S.calMonth=new Date(S.calMonth.getFullYear(),parseInt(m));draw();},
  fTask:(c,i,v)=>{S.form[c].tasks[i]=v;},
  fAdd:c=>{S.form[c].tasks.push('');draw();},
  fRemove:(c,i)=>{S.form[c].tasks.splice(i,1);draw();},
  fCat2:(c,v)=>{S.form[c].cat2=v;},
  fDeadline:(c,v)=>{S.form[c].deadline=v;},
  fMemo:(c,v)=>{S.form[c].memo=v;},
  save:c=>saveLog(c),
  cancelEdit:()=>{S.editId=null;C1.forEach(c=>{S.form[c]=emptyForm();});draw();},
  done:id=>toggleDone(id),
  edit:id=>startEdit(id),
  copy:id=>copyLog(id),
  del:id=>{S.delId=id;draw();},
  doDel:()=>doDel(),
  cancelDel:()=>{S.delId=null;draw();},
  addCat2:()=>addCat2(),
  delCat2:id=>delCat2(id),
  editCat2:(id,val)=>{S.editCat2=id;S.editCat2Val=val;draw();},
  saveCat2:()=>saveCat2Edit(),
  cancelCat2:()=>{S.editCat2=null;S.editCat2Val='';draw();},
  cat2In:v=>{S.newCat2=v;},
  cat2EV:v=>{S.editCat2Val=v;},
  addNotice:()=>addNotice(),
  delNotice:id=>delNotice(id),
  noticeIn:v=>{S.newNotice=v;},
  repWeek:v=>{S.repWeek=parseInt(v);draw();},
};
window.W=W;
draw();
</script>
</body>
